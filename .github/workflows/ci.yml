name: Node.js CI

on:
  pull_request:
    branches: [ main ]

jobs:
  # ── Unit + integration tests (Jest) ──────────────────────────────────────────
  run-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Jest tests
        run: npm run test

  # ── Visual / E2E tests (Playwright) ──────────────────────────────────────────
  e2e:
    runs-on: ubuntu-latest
    needs: run-tests   # only run if unit tests pass

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Cache Playwright browser binaries across runs
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps (cached run)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run Playwright E2E tests
        run: npm run test:e2e
        env:
          # Playwright tests mock all Supabase API calls, so these just need to
          # be non-empty for the Next.js server to start without throwing.
          # All values are placeholders — E2E tests mock every network call
          # so no real keys are needed. Zero GitHub secrets required.
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          NEXT_PUBLIC_PAYPAL_CLIENT_ID: placeholder
          SUPABASE_SERVICE_ROLE_KEY: placeholder
          OPENROUTER_API_KEY: placeholder
          PAYPAL_CLIENT_SECRET: placeholder
          PAYPAL_MODE: sandbox

      # Upload screenshots on failure so you can inspect diffs in the PR
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      # Upload visual snapshot diffs on failure
      - name: Upload snapshot diffs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: snapshot-diffs
          path: '**/*-diff.png'
          retention-days: 7
